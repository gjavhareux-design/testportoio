<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work in Progress | Ganesh Javhare</title>
    <style>
        :root {
            --primary-text: #1a1a1a;
            --secondary-text: #666;
            --accent: #ff0080; 
            --bg-light: #faf8f5; 
            --nav-height: 80px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--primary-text);
            line-height: 1.6;
            overflow: hidden; /* Keeps the cat from causing scrollbars */
            height: 100vh;
            position: relative;
        }

        /* --- NAVIGATION (Matches your main site) --- */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(245, 245, 245, 0.50);
            backdrop-filter: blur(10px); z-index: 1000;
        }
        .nav-logo { 
            font-family: "Brush Script MT", cursive; font-size: 1.6rem; 
            text-decoration: none; color: var(--primary-text); 
            display: flex; align-items: center; gap: 12px; z-index: 1001; 
        }
        .nav-links { display: flex; gap: 35px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--primary-text); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }

        /* --- WIP CENTER CARD --- */
        .wip-container {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; z-index: 10; position: relative;
        }
        
        .wip-card {
            background: rgba(255, 255, 255, 0.6); padding: 50px; border-radius: 30px;
            max-width: 500px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        
        .wip-card h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -0.02em; }
        .wip-card p { color: var(--secondary-text); margin-bottom: 30px; font-size: 1.1rem; }
        
        .back-btn {
            background: var(--primary-text); color: white; padding: 14px 30px; 
            border-radius: 100px; text-decoration: none; font-weight: 600; 
            display: inline-block; transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,0,128,0.3); }

        /* --- THE CAT --- */
        #cat-wrapper {
            position: fixed;
            top: 50%; left: 50%;
            width: 70px; height: 70px;
            /* Centers the cat's origin */
            margin-top: -35px; margin-left: -35px; 
            z-index: 999;
            pointer-events: none; /* So it doesn't block clicks */
        }

        #cat-inner {
            width: 100%; height: 100%;
            transition: transform 0.2s; /* Smooth flipping when changing directions */
        }

        /* The walking bounce animation */
        @keyframes walkBounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }
        .walking #cat-inner {
            animation: walkBounce 0.3s infinite;
        }

        /* Mobile Hamburger Fix for this page */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* Kept simple for WIP page */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">Ganesh Javhare</a>
        <ul class="nav-links">
            <li><a href="index.html#work">Work</a></li>
            <li><a href="index.html#about">About Me</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="wip-container">
        <div class="wip-card">
            <h1>🚧 Brewing Magic</h1>
            <p>I'm still putting the finishing touches on this section. In the meantime, try moving your mouse around and watch my little assistant!</p>
            <a href="index.html" class="back-btn">Head Back Home</a>
        </div>
    </div>

    <div id="cat-wrapper">
        <div id="cat-inner">
            <svg width="70" height="70" viewBox="0 0 100 100">
                <path d="M 80,70 Q 110,60 90,20" fill="none" stroke="#F58216" stroke-width="8" stroke-linecap="round"/>
                <rect x="20" y="45" width="60" height="40" rx="20" fill="#F58216" />
                <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE5B4" />
                <rect x="65" y="70" width="12" height="25" rx="6" fill="#F58216" />
                <rect x="25" y="70" width="12" height="25" rx="6" fill="#F58216" />
                <polygon points="20,40 30,10 45,35" fill="#F58216" />
                <polygon points="25,35 30,20 38,35" fill="#FFA07A" />
                <polygon points="80,40 70,10 55,35" fill="#F58216" />
                <polygon points="75,35 70,20 62,35" fill="#FFA07A" />
                <circle cx="50" cy="45" r="32" fill="#F58216" />
                <path d="M 45,15 L 45,25 M 35,18 L 40,26 M 65,18 L 60,26" stroke="#d66b0d" stroke-width="2.5" stroke-linecap="round"/>
                <ellipse cx="50" cy="55" rx="12" ry="8" fill="#FFE5B4" />
                <circle cx="38" cy="42" r="10" fill="#fff" />
                <circle cx="62" cy="42" r="10" fill="#fff" />
                <g id="pupils">
                    <circle cx="38" cy="42" r="4" fill="#000" />
                    <circle cx="62" cy="42" r="4" fill="#000" />
                </g>
                <polygon points="47,52 53,52 50,56" fill="#ff66b2" />
            </svg>
        </div>
    </div>

    <script>
        // --- MAGIC CAT LOGIC ---
        const catWrapper = document.getElementById('cat-wrapper');
        const catInner = document.getElementById('cat-inner');
        const pupils = document.getElementById('pupils');
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let catX = window.innerWidth / 2;
        let catY = window.innerHeight / 2 + 150; // Start slightly below center
        
        let isWalking = false;
        let stopTimer;

        // 1. Track the mouse anytime it moves
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Stop the cat from walking while you move the mouse
            isWalking = false;
            catWrapper.classList.remove('walking');
            clearTimeout(stopTimer);

            // Calculate eye tracking (Trigonometry!)
            let dx = mouseX - catX;
            let dy = mouseY - catY;
            let angle = Math.atan2(dy, dx);
            
            // Move pupils slightly towards the mouse
            let pupilX = Math.cos(angle) * 3;
            let pupilY = Math.sin(angle) * 3;
            
            // If the cat is facing left, we have to invert the eye math
            if (catInner.style.transform === 'scaleX(-1)') {
                pupilX = -pupilX;
            }
            pupils.style.transform = `translate(${pupilX}px, ${pupilY}px)`;

            // 2. If the mouse STOPS for 600 milliseconds, start walking!
            stopTimer = setTimeout(() => {
                isWalking = true;
                catWrapper.classList.add('walking');
            }, 600); 
        });

        // 3. The Animation Loop for walking
        function catLoop() {
            if (isWalking) {
                let dx = mouseX - catX;
                let dy = mouseY - catY;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // If the cat is more than 80px away from the mouse, walk towards it
                if (distance > 80) {
                    // Speed of the cat (0.03 is a nice trot)
                    catX += dx * 0.03; 
                    catY += dy * 0.03;

                    // Make the cat face the right direction!
                    if (dx > 0) {
                        catInner.style.transform = 'scaleX(1)'; // Face right
                    } else {
                        catInner.style.transform = 'scaleX(-1)'; // Face left
                    }

                    // Actually move the HTML element
                    catWrapper.style.left = catX + 'px';
                    catWrapper.style.top = catY + 'px';
                } else {
                    // We arrived! Stop walking.
                    isWalking = false;
                    catWrapper.classList.remove('walking');
                    
                    // Reset pupils to look straight at the mouse
                    pupils.style.transform = `translate(0px, 0px)`;
                }
            }
            
            // Loop this 60 times a second
            requestAnimationFrame(catLoop);
        }

        // Set initial position and start the loop
        catWrapper.style.left = catX + 'px';
        catWrapper.style.top = catY + 'px';
        requestAnimationFrame(catLoop);
    </script>
</body>
</html>
